<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Replayer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin:0; background:#0b1120; color:#f8fafc; font-family:'Inter',sans-serif; overflow:hidden; }

#replay-container {
    position:absolute; top:0; left:0; width:100%; height:100%;
    z-index:1; overflow-y:auto; pointer-events:none;
}
#bubble-layer {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:50;
}
#controls {
    position:fixed; top:20px; left:20px; width:300px;
    background:rgba(15,23,42,0.95); backdrop-filter:blur(14px);
    padding:20px; border-radius:14px; z-index:100;
    border:1px solid rgba(56,189,248,0.15);
    box-shadow:0 12px 32px rgba(0,0,0,0.6);
}
h3 { margin:0 0 14px; color:#38bdf8; font-size:1rem; letter-spacing:.02em; }
button {
    background:#38bdf8; border:none; padding:9px 14px;
    border-radius:8px; color:#0b1120; font-weight:600;
    font-family:inherit; cursor:pointer; width:100%;
    transition:background .15s, transform .1s;
}
button:hover  { background:#0ea5e9; transform:translateY(-1px); }
button:active { transform:translateY(0); }
button:disabled { background:#334155; color:#64748b; cursor:not-allowed; transform:none; }
.btn-ghost {
    background:transparent; color:#94a3b8;
    border:1px solid rgba(255,255,255,0.12); margin-top:8px;
}
.btn-ghost:hover { background:rgba(255,255,255,.06); color:#f1f5f9; }
.btn-accent {
    background:transparent; color:#38bdf8;
    border:1px solid rgba(56,189,248,0.3); margin-top:8px;
}
.btn-accent:hover { background:rgba(56,189,248,.1); }

#timeline-wrap { margin-top:16px; }
#timeline-wrap label { font-size:0.75rem; color:#64748b; display:block; margin-bottom:4px; }
#timeline { width:100%; cursor:pointer; accent-color:#38bdf8; }
#status { display:block; margin-top:12px; font-size:0.82rem; color:#64748b; text-align:center; min-height:1.2em; }

#fake-cursor {
    position:absolute; width:22px; height:22px; pointer-events:none;
    z-index:9999; top:-100px; left:-100px;
    background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffffff" stroke="%23000" stroke-width="1.5"><path d="M5.5 3.5v16.3l4.7-4.4h6.3z"/></svg>') no-repeat center/contain;
    filter:drop-shadow(1px 3px 4px rgba(0,0,0,.6));
    transition:left .08s linear, top .08s linear;
}
.trail-dot {
    position:absolute; width:4px; height:4px;
    background:rgba(56,189,248,.35); border-radius:50%;
    pointer-events:none; z-index:9997; transform:translate(-50%,-50%);
}

/* ── Text annotation bubbles ───────────────────────────────── */
.text-bubble {
    position:fixed; min-width:150px; max-width:280px;
    background:rgba(15,23,42,.93); border:1px solid rgba(56,189,248,.35);
    border-radius:10px; padding:10px 30px 10px 12px;
    box-shadow:0 6px 22px rgba(0,0,0,.5);
    pointer-events:all; cursor:grab; user-select:none;
    z-index:80; backdrop-filter:blur(8px);
    transition:box-shadow .15s, border-color .15s;
}
.text-bubble:hover { box-shadow:0 8px 28px rgba(56,189,248,.2); border-color:rgba(56,189,248,.6); }
.text-bubble:active { cursor:grabbing; }
.bubble-target {
    font-size:0.65rem; color:#38bdf8; text-transform:uppercase;
    letter-spacing:.05em; margin-bottom:4px; opacity:.75;
}
.bubble-text {
    font-size:0.875rem; color:#e2e8f0;
    word-break:break-word; white-space:pre-wrap; line-height:1.5;
}
.bubble-meta { font-size:0.65rem; color:#475569; margin-top:5px; }
.bubble-close {
    position:absolute; top:6px; right:8px;
    font-size:0.7rem; color:#475569; cursor:pointer;
    padding:2px 5px; border-radius:4px;
    transition:color .12s, background .12s;
}
.bubble-close:hover { color:#f87171; background:rgba(248,113,113,.12); }
.bubble-break {
    display:inline-block; font-size:.6rem; color:#475569;
    background:rgba(71,85,105,.2); border-radius:3px; padding:0 3px; margin:0 2px;
    vertical-align:middle;
}
</style>
</head>
<body>

<div id="replay-container"></div>
<div id="bubble-layer"></div>
<div id="fake-cursor"></div>

<div id="controls">
    <h3>Session Replayer</h3>
    <button id="playBtn">Play Activity</button>
    <button id="clearBtn" class="btn-ghost">Clear Trails</button>
    <button id="bubblesBtn" class="btn-accent">Show Text Annotations</button>
    <div id="timeline-wrap">
        <label>Timeline</label>
        <input type="range" id="timeline" min="0" max="100" value="0">
    </div>
    <span id="status">Loading…</span>
</div>

<script>
const $ = id => document.getElementById(id);
const playBtn = $('playBtn'), clearBtn = $('clearBtn'), bubblesBtn = $('bubblesBtn');
const timeline = $('timeline'), statusEl = $('status');
const cursor = $('fake-cursor'), replayContainer = $('replay-container'), bubbleLayer = $('bubble-layer');

let events = [], isPlaying = false, startTime = 0, totalDuration = 0, seekOffset = 0, bubblesVisible = false;

// ── Text grouping ─────────────────────────────────────────────────────────
const SPLIT_KEYS  = new Set(['Tab','Enter']);
const IGNORE_KEYS = new Set(['Shift','Control','Alt','Meta','CapsLock',
    'ArrowLeft','ArrowRight','ArrowUp','ArrowDown',
    'Home','End','PageUp','PageDown','Escape',
    'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12']);
const GAP_MS = 1500;

function reconstructText(keys) {
    let t = '';
    for (const k of keys) {
        if (k === 'Backspace')    t = t.slice(0,-1);
        else if (k === 'Delete')  t = t.slice(1);
        else if (SPLIT_KEYS.has(k)) t += '\n';
        else if (k.length === 1)  t += k;
    }
    return t.trim();
}

function buildTextGroups(allEvents) {
    const keys   = allEvents.filter(e => e.type === 'keydown');
    const moves  = allEvents.filter(e => e.type === 'mousemove');
    const mouseAt = ts => {
        let p = {x:350, y:200};
        for (const m of moves) { if (m.timestamp > ts) break; p = {x:m.x, y:m.y}; }
        return p;
    };

    const groups = []; let cur = null;
    for (const ev of keys) {
        const isBreak   = SPLIT_KEYS.has(ev.key);
        const isIgnored = IGNORE_KEYS.has(ev.key);
        const gap       = cur ? ev.timestamp - cur.endTs : Infinity;
        const sameTarget = cur && cur.target === ev.target;

        if (!cur || !sameTarget || gap > GAP_MS) {
            if (cur?.keys.length) groups.push(cur);
            const p = mouseAt(ev.timestamp);
            cur = { target:ev.target, keys:[], startTs:ev.timestamp, endTs:ev.timestamp, ax:p.x, ay:p.y };
        }
        cur.endTs = ev.timestamp;
        if (isIgnored) continue;
        if (isBreak) {
            cur.keys.push(ev.key);
            groups.push(cur);
            const p = mouseAt(ev.timestamp);
            cur = { target:ev.target, keys:[], startTs:ev.timestamp, endTs:ev.timestamp, ax:p.x, ay:p.y };
        } else { cur.keys.push(ev.key); }
    }
    if (cur?.keys.length) groups.push(cur);
    return groups.filter(g => reconstructText(g.keys).length > 0);
}

// ── Bubble placement ─────────────────────────────────────────────────────
const BW = 230, BH = 95, PAD = 16;
const placed = [];
function noOverlap(x, y) {
    return placed.every(r => x >= r.x+r.w+PAD || x+BW+PAD <= r.x || y >= r.y+r.h+PAD || y+BH+PAD <= r.y);
}
function findPos(ax, ay) {
    const tries = [[16,-BH-8],[16,16],[-BW-16,-BH-8],[-BW-16,16],[16,BH+16],[16,-BH*2-16]];
    for (const [dx,dy] of tries) {
        const x = Math.max(8, Math.min(innerWidth -BW-8, ax+dx));
        const y = Math.max(8, Math.min(innerHeight-BH-8, ay+dy));
        if (noOverlap(x,y)) { placed.push({x,y,w:BW,h:BH}); return {x,y}; }
    }
    const last = placed.at(-1) ?? {x:340,y:20,w:BW,h:BH};
    const x = last.x, y = last.y+last.h+PAD;
    placed.push({x,y,w:BW,h:BH}); return {x,y};
}

// ── Drag ─────────────────────────────────────────────────────────────────
function makeDraggable(el) {
    let ox=0, oy=0, on=false;
    el.addEventListener('mousedown', e => {
        if (e.target.classList.contains('bubble-close')) return;
        on=true; ox=e.clientX-el.getBoundingClientRect().left; oy=e.clientY-el.getBoundingClientRect().top;
        el.style.transition='none'; e.preventDefault();
    });
    document.addEventListener('mousemove', e => { if(on){ el.style.left=(e.clientX-ox)+'px'; el.style.top=(e.clientY-oy)+'px'; }});
    document.addEventListener('mouseup', ()=>{ on=false; });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtText(t) { return t.split('\n').map(esc).join('<span class="bubble-break">↵</span>'); }

function renderBubbles() {
    bubbleLayer.innerHTML=''; placed.length=0;
    const groups = buildTextGroups(events);
    if (!groups.length) { statusEl.textContent='No typed text in session.'; return; }
    groups.forEach(g => {
        const text = reconstructText(g.keys);
        const {x,y} = findPos(g.ax, g.ay);
        const label = (g.target||'unknown').replace(/#/g,' #').replace(/\./g,' .').trim();
        const dur   = ((g.endTs-g.startTs)/1000).toFixed(1);
        const el = Object.assign(document.createElement('div'), { className:'text-bubble' });
        el.style.left=x+'px'; el.style.top=y+'px';
        el.innerHTML=`<div class="bubble-close" title="Dismiss">✕</div>
<div class="bubble-target">${esc(label)}</div>
<div class="bubble-text">${fmtText(text)}</div>
<div class="bubble-meta">${dur}s · ${g.keys.length} keys</div>`;
        el.querySelector('.bubble-close').onclick=()=>el.remove();
        makeDraggable(el); bubbleLayer.appendChild(el);
    });
    statusEl.textContent=`${groups.length} annotation(s).`;
}

// ── Data fetching ─────────────────────────────────────────────────────────
async function fetchUI() {
    statusEl.textContent='Loading site…';
    try { replayContainer.innerHTML = await (await fetch('/proxy')).text(); }
    catch { statusEl.textContent='Error loading site.'; }
}
async function fetchEvents() {
    await fetchUI();
    statusEl.textContent='Loading events…';
    try {
        const {events:evs} = await (await fetch('/api/events')).json();
        events=evs;
        if (events.length) {
            startTime=events[0].timestamp;
            totalDuration=events.at(-1).timestamp-startTime;
            timeline.max=totalDuration;
            statusEl.textContent=`${events.length} events · ${(totalDuration/1000).toFixed(1)}s`;
        } else { statusEl.textContent='No events.'; }
    } catch { statusEl.textContent='Error loading events.'; }
}

// ── Replay ────────────────────────────────────────────────────────────────
function drawTrail(x,y) {
    const d=document.createElement('div'); d.className='trail-dot';
    d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d);
}
async function playSession() {
    if (!events.length) await fetchEvents();
    if (!events.length) return;
    isPlaying=!isPlaying;
    playBtn.textContent=isPlaying?'Pause':'Resume';
    if (!isPlaying) return;
    statusEl.textContent='Replaying…';
    const t0=performance.now()-seekOffset;
    (function tick() {
        if (!isPlaying) return;
        seekOffset=performance.now()-t0;
        timeline.value=seekOffset;
        const cur0 = events.filter(e=>(e.timestamp-startTime)<=seekOffset);
        const last  = cur0.at(-1);
        if (last?.type==='mousemove') {
            cursor.style.left=last.x+'px'; cursor.style.top=last.y+'px';
            if (Math.random()>.82) drawTrail(last.x,last.y);
        }
        const sc=cur0.findLast(e=>e.type==='scroll');
        if (sc) replayContainer.scrollTop=sc.y;
        if (seekOffset>=totalDuration) { isPlaying=false; playBtn.textContent='Replay'; return; }
        requestAnimationFrame(tick);
    })();
}
timeline.addEventListener('input',()=>{
    seekOffset=+timeline.value; isPlaying=false; playBtn.textContent='Resume';
    const ev=events.findLast(e=>(e.timestamp-startTime)<=seekOffset);
    if (ev?.type==='mousemove') { cursor.style.left=ev.x+'px'; cursor.style.top=ev.y+'px'; }
    const sc=events.filter(e=>(e.timestamp-startTime)<=seekOffset&&e.type==='scroll').at(-1);
    if (sc) replayContainer.scrollTop=sc.y;
});
clearBtn.onclick=()=>document.querySelectorAll('.trail-dot').forEach(d=>d.remove());
bubblesBtn.onclick=()=>{
    bubblesVisible=!bubblesVisible;
    if (bubblesVisible) { renderBubbles(); bubblesBtn.textContent='Hide Annotations'; }
    else { bubbleLayer.innerHTML=''; bubblesBtn.textContent='Show Text Annotations'; }
};
playBtn.onclick=playSession;
fetchEvents();
</script>
</body>
</html>
